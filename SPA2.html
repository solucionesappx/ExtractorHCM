        document.getElementById('detail-modal')?.classList.remove('hidden');

        const content = document.getElementById('detail-modal-content');
        const title = document.getElementById('detail-modal-title');
        
        const configMapRaw = JSON.parse(localStorage.getItem('TABLE_CONFIG') || '{}');
        const configMap = {};
        Object.keys(configMapRaw).forEach(k => { configMap[k.toUpperCase()] = configMapRaw[k]; });
        
        content.innerHTML = '';

        // 3. TÍTULO DE LA OPERACIÓN
        title.innerHTML = `
            <div class="flex items-center justify-end w-full px-2 py-1">
                <div class="flex items-center gap-2">
                    <span id="title-badge-mode" class="px-2 py-0.5 rounded-full text-[10px] font-bold uppercase tracking-wider bg-blue-500/20 text-blue-400 border border-blue-500/30">
                        BORRADOR TR
                    </span>
                    <i data-lucide="shield-plus" class="w-5 h-5 text-blue-400"></i>
                </div>
            </div>`;

        // 4. RENDERIZADO DINÁMICO DE CAMPOS
        Object.keys(configMap).forEach(key => {
            const cfg = configMap[key]; 
            const cleanKey = key.toUpperCase();
            
            // --- A. GESTIÓN ROBUSTA DEL ID DE CUENTA (SILENCIOSO) ---
            // Al igual que en Duplicate, necesitamos que el input exista para saveRecord
            if (cleanKey === `${prefix}CUENTA`) {
                const hiddenIdInput = document.createElement('input');
                hiddenIdInput.type = 'hidden';
                hiddenIdInput.dataset.field = key; 
                hiddenIdInput.value = ''; // Se llenará vía Alias en saveRecord
                content.appendChild(hiddenIdInput);
                return;
            }

            // --- B. FILTROS DE VISIBILIDAD Y EXCLUSIÓN ---
            const visibility = String(cfg.visible || '').toLowerCase().trim();
            if (visibility !== 'x' && visibility !== 'xx') return;
            if (cfg.Es_Calculado === true || String(cfg.Es_Calculado).toLowerCase() === "calc") return;
            if (cleanKey.endsWith('ID') || cleanKey.includes('IDOWNER')) return;
            if (cleanKey.includes('REGISTRO') && !cleanKey.includes('TYPEREG')) return;

            const isMovementField = cleanKey.includes('MOVIMIENTO');
            const isTypeRegField = cleanKey.includes('TYPEREG');
            const isReadOnly = visibility === 'xx' || cfg.editable === false;
            const isRequired = cfg.Es_Obligatorio === true || cleanKey.includes('CUENTA');
            const asterisco = isRequired && !isReadOnly ? '<span class="text-red-500 ml-1 font-bold">*</span>' : '';

            // Identificación de tipos para el renderizado
            const isDescription = cleanKey.includes('DESCRIPCION');
            const isDate = cleanKey.includes('FECHA') || cleanKey.includes('DATE');
            const isNumeric = cleanKey.includes('IMPORTE') || cleanKey.includes('MONTO');
            
            const rowItem = document.createElement('div');
            if (isTypeRegField) rowItem.className = 'hidden';
            else rowItem.className = 'grid grid-cols-[110px_1fr] gap-6 px-2 py-1 border-b border-gray-800/50 items-center hover:bg-white/5';
            
            let inputHTML = '';

            // --- C. LÓGICA DE DIBUJO ---
            if (isMovementField) {
                inputHTML = `
                    <div class="flex items-center h-[24px] px-2 py-0">
                        <span class="text-sm text-blue-400 font-bold uppercase tracking-tight">TRANSFERENCIA</span>
                        <input type="hidden" data-field="${key}" value="TRANSFERENCIA">
                    </div>`;
            } 
            else if (isTypeRegField) {
                inputHTML = `<input type="hidden" data-field="${key}" value="REGISTRADO">`;
            }
            else if (isReadOnly) {
                const val = cleanKey.includes('IMPORTE') || cleanKey.includes('MONTO') ? "0,00" : "";
                inputHTML = `
                    <div class="flex items-center h-[24px] px-2 py-0">
                        <span class="text-sm text-gray-500 font-bold uppercase opacity-70">${val}</span>
                        <input type="hidden" data-field="${key}" value="${val}">
                    </div>`;
            }
            else {
                const dictOptions = dictionaryTR[`${tableClean}|${cleanKey}`];
                const isAliasField = cleanKey.endsWith('ALIASCUENTA');
                const isCuenta2 = cleanKey.endsWith('CUENTA2');

                // --- DISEÑO SELECT RESTAURADO ---
                if (dictOptions || isAliasField || isCuenta2) {
                    let optionsArray = dictOptions || [];
                    // Carga de emergencia si es Alias y el diccionario está vacío
                    if ((isAliasField || isCuenta2) && optionsArray.length === 0) {
                        optionsArray = (window.dashboardState?.cuentas || []).map(c => c.ALIAS);
                    }

                    const optionsHtml = optionsArray.map(opt => 
                        `<option value="${opt}" style="background-color: var(--bg); color: var(--txt);">${opt}</option>`
                    ).join('');

                    inputHTML = `
                        <div class="relative w-full group">
                            <select data-field="${key}" 
                                style="background-color: var(--bg); border-color: var(--th); color: var(--p-soft);"
                                class="border rounded px-2 py-0 text-sm font-bold w-full focus:outline-none transition-all appearance-none cursor-pointer pr-8 hover:brightness-110 shadow-sm">
                                <option value="" selected style="background-color: var(--bg); color: var(--txt);">-- SELECCIONE --</option>
                                ${optionsHtml}
                            </select>
                            <div class="absolute inset-y-0 right-2 flex items-center pointer-events-none opacity-60 group-hover:opacity-100 transition-opacity">
                                <i data-lucide="search" class="w-3.5 h-3.5" style="color: var(--p-soft);"></i>
                            </div>
                        </div>`;
                } 
                else if (cleanKey.includes('DESCRIPCION')) {
                    inputHTML = `<textarea data-field="${key}" class="bg-gray-500/20 border border-transparent focus:border-blue-500/50 rounded px-2 py-1 text-sm text-gray-100 font-bold w-full focus:outline-none resize-none h-[60px]"></textarea>`;
                } 
                else if (isDate) {
                    // Obtenemos la fecha local del sistema (Año-Mes-Día)
                    const d = new Date();
                    const year = d.getFullYear();
                    const month = (d.getMonth() + 1).toString().padStart(2, '0');
                    const day = d.getDate().toString().padStart(2, '0');
                    
                    const hoy = `${year}-${month}-${day}`; // Formato YYYY-MM-DD que requiere el input type="date"

                    inputHTML = `<input type="date" data-field="${key}" value="${hoy}" class="custom-date-input bg-gray-500/20 border border-transparent focus:border-blue-500/50 rounded px-2 py-0 text-sm text-gray-100 font-bold w-full focus:outline-none transition-colors">`;
                } 
                else if (cleanKey.includes('IMPORTE') || cleanKey.includes('MONTO')) {
                    inputHTML = `<input type="text" data-field="${key}" data-raw="0" value="0,00" onfocus="this.select()" oninput="applyAccountingMask(this)" class="bg-gray-500/20 border border-transparent focus:border-blue-500/50 rounded px-2 py-0 text-sm text-gray-100 font-bold w-full focus:outline-none text-right">`;
                } 
                else {
                    inputHTML = `<input type="text" data-field="${key}" class="bg-gray-500/20 border border-transparent focus:border-blue-500/50 rounded px-2 py-0 text-sm text-gray-100 font-bold w-full focus:outline-none uppercase">`;
                }
            }

                rowItem.innerHTML = `
                <span class="text-gray-200 font-medium uppercase text-[10px] self-start flex items-center">
                    ${cfg.label || key}${asterisco}
                </span>
                ${inputHTML}`;
                
            content.appendChild(rowItem);
        });

        if (window.lucide) lucide.createIcons();
        
        // 5. VALIDACIÓN VISUAL INTEGRAL (Simetría de errores)
        setTimeout(() => {
            const selectEmisora = content.querySelector(`[data-field$="ALIASCUENTA"]`);
            const selectReceptora = content.querySelector(`[data-field$="CUENTA2"]`);
            const selectMoneda = content.querySelector(`[data-field$="MONEDA"]`); 
            const matrizCuentas = JSON.parse(localStorage.getItem('MATRIZ_CUENTAS_USUARIO') || "[]");

            if (selectEmisora && selectReceptora && selectMoneda) {
                const validarTodoVisual = () => {
                    const aliasE = selectEmisora.value?.trim();
                    const aliasR = selectReceptora.value?.trim();
                    const monedaReg = selectMoneda.value?.trim().toUpperCase();

                    const infoE = matrizCuentas.find(c => String(c.TD102ALIAS || c.ALIAS).trim() === aliasE);
                    const infoR = matrizCuentas.find(c => String(c.TD102ALIAS || c.ALIAS).trim() === aliasR);

                    // --- VALIDACIÓN 1: MONEDA REGISTRO VS CUENTA ORIGEN ---
                    const monedaInconsistente = infoE && monedaReg && infoE.TD102MONEDA !== monedaReg;
                    
                    // Aplicamos error a AMBOS campos involucrados en la moneda
                    [selectEmisora, selectMoneda].forEach(el => {
                        el.style.borderColor = monedaInconsistente ? 'rgb(239 68 68)' : 'var(--th)';
                        el.style.backgroundColor = monedaInconsistente ? 'rgba(239, 68, 68, 0.05)' : 'var(--bg)';
                    });

                    // --- VALIDACIÓN 2: TRANSFERENCIA (CUENTA DESTINO) ---
                    if (infoE && infoR) {
                        const sonIguales = (infoE.TD102ID || infoE.ID) === (infoR.TD102ID || infoR.ID);
                        const monedasTrDiff = infoE.TD102MONEDA !== infoR.TD102MONEDA;

                        const hayErrorDestino = sonIguales || monedasTrDiff;
                        
                        selectReceptora.style.borderColor = hayErrorDestino ? 'rgb(239 68 68)' : 'var(--th)';
                        selectReceptora.style.backgroundColor = hayErrorDestino ? 'rgba(239, 68, 68, 0.05)' : 'var(--bg)';
                        
                        // Si el error en la receptora es por moneda, también marcamos la moneda del registro
                        if (monedasTrDiff) {
                            selectMoneda.style.borderColor = 'rgb(239 68 68)';
                            selectMoneda.style.backgroundColor = 'rgba(239, 68, 68, 0.05)';
                        }
                    }
                };

                selectEmisora.addEventListener('change', validarTodoVisual);
                selectReceptora.addEventListener('change', validarTodoVisual);
                selectMoneda.addEventListener('change', validarTodoVisual);
                
                validarTodoVisual();
            }
        }, 500);
    }
        
    function duplicateCurrentRecord() {
        const rawData = localStorage.getItem('TABLE_DATA');
        const dataObj = JSON.parse(rawData || '{}');
        const row = dataObj.DATOS_REGISTRO;
        if (!row) return;

        normalizeToolbar();
        ['Duplicar', 'Borrar', 'Nuevo', 'Editar'].forEach(disableButton);
        
        // Al duplicar, tratamos el "Cancelar" como la salida principal
        document.getElementById('btn-modal-save')?.classList.remove('hidden');
        document.getElementById('btn-modal-cancel')?.classList.remove('hidden');
        document.getElementById('btn-modal-return')?.classList.add('hidden');

        const btnCancel = document.getElementById('btn-modal-cancel');
        if (btnCancel) {
            btnCancel.onclick = () => {
                // Seteamos DATOS_REGISTRO a null temporalmente para que cancelActualForm 
                // entienda que si cancela el duplicado, debe cerrar el modal o volver al original
                cancelActualForm(); 
            };
        }

        const content = document.getElementById('detail-modal-content');
        const title = document.getElementById('detail-modal-title');
        const configMapRaw = JSON.parse(localStorage.getItem('TABLE_CONFIG') || '{}');
        const dictionary = JSON.parse(localStorage.getItem('VALUE_DICTIONARY') || '{}');

        // Normalización del configMap
        const configMap = {};
        Object.keys(configMapRaw).forEach(k => configMap[k.toUpperCase()] = configMapRaw[k]);

        const tablePrefix = (dataObj.TABLA_ORIGEN || currentTableName).split('_')[0].toUpperCase();
        const idFieldName = tablePrefix + 'ID';
        
        content.innerHTML = '';

        // 2. TÍTULO (Estilo Duplicado)
        title.innerHTML = `
               <div class="flex items-center justify-end w-full px-2 py-1">
                <div class="flex items-center gap-2">
                    <span id="title-badge-mode" class="px-2 py-0.5 rounded-full text-[10px] font-bold uppercase tracking-wider bg-yellow-500/20 text-yellow-400 border border-yellow-500/30">
                        NUEVO (DUPLICADO)
                    </span>
                    <i data-lucide="shield-plus" class="w-5 h-5 text-yellow-400"></i>
                </div>
            </div>`;

        // 3. RENDERIZADO DE CAMPOS
        Object.keys(row).forEach(key => {
            const cleanKey = key.toUpperCase();
            
            // Exclusión de IDs de registro
            if (cleanKey.includes('REGISTRO') || cleanKey.includes('TYPEREG') || cleanKey === idFieldName) return;
            
            const cfg = configMap[cleanKey] || {};
            const visValue = String(cfg.visible || '').toLowerCase().trim();

            const isIdCuenta = cleanKey === `${tablePrefix}CUENTA`;
            if (visValue === "" && !isIdCuenta) return;

            const isEditable = visValue === 'x' && cfg.editable !== false && cfg.Es_Calculado !== true;
            const isRequired = cfg.Es_Obligatorio === true || String(cfg.Es_Obligatorio).toLowerCase() === "true";
            const asterisco = isRequired ? '<span class="text-red-500 ml-1 font-bold">*</span>' : '';

            const item = document.createElement('div');
            item.className = 'grid grid-cols-[110px_1fr] px-2 py-1 border-b border-gray-800/50 last:border-0 hover:bg-white/5 justify-items-start';
            
            const val = row[key] || '';
            let valueElement = '';

            if (isIdCuenta) {
                valueElement = `<input type="hidden" data-field="${key}" value="${val}">`;
                item.className = 'hidden'; 
            } 
            else if (!isEditable) {
                const isAliasTarget = cleanKey.endsWith('ALIAS');
                valueElement = `
                    <div class="flex items-center h-[24px] px-2 w-full justify-between">
                        <span class="text-sm font-bold uppercase text-gray-500 opacity-90 ${isAliasTarget ? 'visual-alias-span' : ''}">${getFormattedValue(key, val)}</span>
                        <input type="hidden" data-field="${key}" value="${val}">
                        <i data-lucide="${cfg.Es_Calculado ? 'calculator' : 'lock'}" class="w-3.5 h-3.5 text-gray-700"></i>
                    </div>`;
            } 
            else {
                const dictKey = `${currentTableName}|${key}`.toUpperCase();
                const dictOptions = dictionary[dictKey];
                const isAliasField = cleanKey.endsWith('ALIASCUENTA');
                const isSelect = dictOptions && dictOptions.length > 0 && (
                    cleanKey.includes('MONEDA') || cleanKey.includes('MOVIMIENTO') || cleanKey.includes('TIPO') || isAliasField
                );

                if (isSelect) {
                    const valActual = String(val || '').trim();
                    let options = dictOptions || [];
                    
                    if (isAliasField && options.length === 0) {
                        options = (window.dashboardState?.cuentas || []).map(c => c.ALIAS);
                    }

                    const existeEnOpciones = options.some(opt => String(opt).trim() === valActual);
                    const optionsHtml = options.map(opt => {
                        const isSelected = String(opt).trim() === valActual;
                        return `<option value="${opt}" ${isSelected ? 'selected' : ''} style="background-color: var(--bg); color: var(--txt);">${opt}</option>`;
                    }).join('');

                    valueElement = `
                        <div class="relative w-full group">
                            <select data-field="${key}" onchange="updateTD102Alias()"
                                class="bg-transparent border border-gray-700 rounded px-2 py-0 text-sm font-bold w-full focus:outline-none appearance-none cursor-pointer pr-8 shadow-sm">
                                ${!existeEnOpciones ? `<option value="${valActual}" selected>${valActual || '-- SELECCIONE --'}</option>` : ''}
                                ${optionsHtml}
                            </select>
                            <div class="absolute inset-y-0 right-2 flex items-center pointer-events-none opacity-60">
                                <i data-lucide="search" class="w-3.5 h-3.5"></i>
                            </div>
                        </div>`;
                } else if ((cleanKey.includes('FECHA') || cleanKey.includes('DATE')) && !cleanKey.includes('VIGENCIA')) {
                    let dateISO = val.includes('/') ? val.split('/').reverse().join('-') : (val.includes('T') ? val.split('T')[0] : val);
                    valueElement = `<input type="date" data-field="${key}" value="${dateISO}" class="bg-gray-800/50 border border-transparent focus:border-gray-500 rounded px-2 py-0 text-sm text-gray-100 font-bold w-full focus:outline-none">`;
                } else if (cleanKey.includes('IMPORTE') || cleanKey.includes('MONTO')) {
                    valueElement = `<input type="text" data-field="${key}" data-raw="${val}" value="${getFormattedValue(key, val)}" onfocus="this.select()" oninput="applyAccountingMask(this)" class="bg-gray-800/50 border border-transparent focus:border-gray-500 rounded px-2 py-0 text-sm text-gray-100 font-bold w-full text-right focus:outline-none">`;
                } else if (cleanKey.includes('DESCRIPCION')) {
                    valueElement = `<textarea data-field="${key}" class="bg-gray-800/30 border border-transparent focus:border-gray-500 rounded px-2 py-1 text-sm text-gray-100 font-bold w-full focus:outline-none resize-none h-[60px] uppercase">${val}</textarea>`;
                } else {
                    // Lógica para campos de texto: NUMERO (máscara) vs OTROS (update alias)
                    const isNumeroCard = cleanKey.endsWith('NUMERO');
                    const onInputCall = isNumeroCard ? 'applyCardMask(this)' : 'updateTD102Alias()';
                    const maxLen = isNumeroCard ? 'maxlength="19"' : '';

                    valueElement = `<input type="text" data-field="${key}" value="${val}" oninput="${onInputCall}" ${maxLen} class="bg-gray-800/30 border border-transparent focus:border-gray-500 rounded px-2 py-0 text-sm text-gray-100 font-bold w-full focus:outline-none uppercase">`;
                }
            }

            item.innerHTML = `<span class="text-gray-200 font-medium uppercase text-[10px] self-start flex items-center">${cfg.label || key}${asterisco}</span>${valueElement}`;
            content.appendChild(item);
        });

        // Aplicar máscara inicial al duplicar si el registro base ya tenía un número
        const numInput = content.querySelector(`[data-field$="NUMERO"]`);
        if (numInput && typeof applyCardMask === 'function') applyCardMask(numInput);

        if (window.lucide) lucide.createIcons();
        if (typeof updateTD102Alias === 'function') updateTD102Alias();

        if (window.lucide) lucide.createIcons();
        
        // Ejecutamos una actualización inicial por si el registro duplicado requiere recalcular el Alias
        if (typeof updateTD102Alias === 'function') updateTD102Alias();
    }

</script>

<script>

    function triggerPdfUpload() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.pdf';
        input.onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            // Detectamos la tabla actual desde el localStorage
            const tableData = JSON.parse(localStorage.getItem('TABLE_DATA') || '{}');
            const currentTable = tableData.TABLA_ORIGEN || window.currentTableName;

            if (currentTable === 'TD201_MAIN') {
                await processAndShowModalSMED(file);
            } else if (currentTable === 'TD101_MAIN') {
                await processAndShowModalHCM(file);
            } else {
                abrirModal('warn', 'Atención', 'Esta tabla no admite carga por PDF.');
            }
        };
        input.click();
    }

async function processAndShowModalHCM(file) {
    try {
        const arrayBuffer = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
        let fullText = "";

        for (let i = 1; i <= pdf.numPages; i++) {
            const page = await pdf.getPage(i);
            const textContent = await page.getTextContent();
            fullText += textContent.items.map(item => item.str).join(" ") + " ";
        }

        const bloqueFactura = extractRaw(fullText, /NOTAS ADICIONALES([\s\S]*?)se firma en:/);

        const registroPdf = {
            "TD101ID": "NUEVO_PDF",
            "TD101POLIZA": extractRaw(fullText, /(\d+\s*-\s*\d+\s*-\s*\d+)/),
            "TD101FECHAHEADER": extractRaw(fullText, /(\d{2}\/\d{2}\/\d{4})\s*Póliza Nro\./),
            "TD101EMPRESA": extractRaw(bloqueFactura, /C\.I\. \/ R\.I\.F\. No\.:\s*([\s\S]*?)\s*Por Mercantil Seguros/i),
            "TD101RIF": extractRaw(bloqueFactura, /([JVEG]-[\d-]+)/),
            "TD101FRECUENCIA": "MENSUAL",
            "TD101MONEDA": "USD",
            "TD101FACTURA": extractRaw(bloqueFactura, /Factura Nº:\s*(\d+)/),
            "TD101FECHAEMISION": extractRaw(bloqueFactura, /Fecha de Emisión:\s*(\d{2}\/\d{2}\/\d{4})/),
            "TD101PERIODOFACT": extractRaw(bloqueFactura, /Desde \(dd\/mm\/aaaa\):\s*(\d{2}\/\d{2}\/\d{4}\s+\d{2}\/\d{2}\/\d{4})/)
                                .trim().replace(/\s+/, " al "),
            "TD101MOVIMIENTO": extractRaw(bloqueFactura, /Tipo de Movimiento:\s*([\s\S]*?)\s*DATOS DE LA FACTURA/),
            "TD101MONTOPRIMA": extractRaw(bloqueFactura, /Total Prima Bruta:\s*(-?[\d.,]+)/),
            "TD101MONTOIGTF": extractRaw(bloqueFactura, /0,00\s+(-?[\d.,]+)\s+PAGO DIRECTO/),
            "TD101MONTOTOTAL": extractRaw(bloqueFactura, /Total a Pagar:\s*(-?[\d.,]+)/),
            "TD101ARCHIVO": file.name 
        };

        // --- LÓGICA DE VALIDACIÓN DE DUPLICADOS ---
        // (Se mantiene igual que en tu código original...)
        const sourceData = (typeof TABLE_CACHE !== 'undefined' && TABLE_CACHE.data) 
                            ? TABLE_CACHE.data 
                            : (typeof originalData !== 'undefined' ? originalData : []);

        if (sourceData.length > 0) {
            const cleanM = (val) => String(val || "").replace(/[.,\s]/g, "");
            const toCompareDate = (val) => {
                if (!val) return "";
                let s = String(val).trim();
                if (s.includes("/")) {
                    const parts = s.split("/");
                    if (parts.length === 3) return `${parts[2]}-${parts[1]}-${parts[0]}`;
                }
                if (s.includes("-") && s.includes("T")) return s.substring(0, 10);
                return s;
            };

            const nuevoP = String(registroPdf.TD101POLIZA || "").trim().toUpperCase();
            const nuevoF = toCompareDate(registroPdf.TD101FECHAEMISION);
            const nuevoM = cleanM(registroPdf.TD101MONTOTOTAL);
            const nuevoFX = cleanM(registroPdf.TD101FACTURA);

            const esDuplicado = sourceData.some((row) => {
                const filaP = String(row.TD101POLIZA || "").trim().toUpperCase();
                const filaF = toCompareDate(row.TD101FECHAEMISION);
                const filaM = cleanM(row.TD101MONTOTOTAL);
                const filaFX = cleanM(row.TD101FACTURA);
                return (filaP === nuevoP && filaF === nuevoF && filaM === nuevoM && filaFX === nuevoFX);
            });

            if (esDuplicado) {
                const msg = `<b>¡POSIBLE DUPLICADO DETECTADO!</b><br><br>` +
                            `<div class="text-left inline-block">` +
                                `• <b>Póliza:</b> ${nuevoP}<br>` +
                                `• <b>Recibo:</b> ${registroPdf.TD101FACTURA}<br>` +
                                `• <b>Fecha:</b> ${registroPdf.TD101FECHAEMISION}<br>` +
                                `• <b>Monto Total:</b> ${registroPdf.TD101MONTOTOTAL}` +
                            `</div><br><br>¿Desea abrir el modal y procesarlo de todos modos?`;
                
                const continuar = await showSystemModal({ title: 'Error de Duplicidad', text: msg, type: 'warning', showCancel: true });
                if (!continuar) return;
            }
        }

        // --- NORMALIZACIÓN PARA INPUTS DATE ANTES DE RENDER ---
        // Convertimos DD/MM/YYYY a YYYY-MM-DD solo para las llaves que contienen FECHA, DATE o VIGENCIA
        Object.keys(registroPdf).forEach(key => {
            const k = key.toUpperCase();
            if (k.includes('FECHA') || k.includes('DATE') || k.includes('VIGENCIA')) {
                const val = registroPdf[key];
                if (val && val.includes('/')) {
                    const p = val.split('/');
                    if (p.length === 3) registroPdf[key] = `${p[2]}-${p[1]}-${p[0]}`;
                }
            }
        });
            
        localStorage.setItem('DATA_PDF', JSON.stringify(registroPdf));
        renderPdfAsEditable(registroPdf);

    } catch (error) {
        console.error("Error crítico:", error);
        await showSystemModal({ title: 'Error', text: 'No se pudo leer el PDF.', type: 'danger' });
    }
}

async function processAndShowModalSMED(file) {
        try {
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
            let fullText = "";

            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const textContent = await page.getTextContent();
                fullText += textContent.items.map(item => item.str).join(" ") + " ";
            }

            // --- Lógica de Extracción SMED ---
            const nombreEmisor = extractRaw(fullText, /^([\s\S]*?)\s*PROFORMA/).trim();
            const rifEmisor = extractRaw(fullText, /PROFORMA\s*\d+\s+([JVEG]-[\d-]+)/);
            const rawEvaluacion = extractRaw(fullText, /Evaluación\s*([\s\S]*?)\s*Región/);
            const fechaEval = extractRaw(rawEvaluacion, /(\d{2}\/\d{2}\/\d{2,4})$/);
           
            const registroPdf = {
                "TD201ID": "NUEVO_PDF",
                "TD201COMPANIA": (nombreEmisor + " / " + (rifEmisor !== "No detectado" ? rifEmisor : "")).trim(),
                "TD201EMPRESA": extractRaw(fullText, /Nombre o Razón Social:\s*([\s\S]*?)\s*R\.I\.F\./).trim(),
                "TD201RIF": extractRaw(fullText, /R\.I\.F\.\s*([JVEG]-[\d-]+)/).trim(),
                "TD201FACTURA": extractRaw(fullText, /PROFORMA\s*(\d+)/).trim(),
                "TD201FECHAEMISION": extractRaw(fullText, /Fecha de Emisión:\s*(\d{2}\/\d{2}\/\d{4})/).trim(),
                "TD201CASOS": extractRaw(fullText, /Casos\s*([\s\S]*?)\s*Evaluación/),
                "TD201REGION": extractRaw(fullText, /Región\s*([\s\S]*?)\s*Actividad/),
                "TD201PERIODO": fechaEval !== "No detectado" ? fechaEval : "00/00/00",
                "TD201MOVIMIENTO": "PROFORMA SERVICIOS",
                "TD201MONEDA": "USD",
                "TD201MONTOBRUTO": extractRaw(fullText, /EXENTO Y\/O EXONERADO \$\s*([\d.,]+)/),
                "TD201MONTOIMPUESTOS": extractRaw(fullText, /TOTAL IVA \(16%\) \$\s*([\d.,\-]+)/),
                "TD201MONTOTOTAL": extractRaw(fullText, /TOTAL A PAGAR \$\s*([\d.,]+)/),
                "TD201ARCHIVO": file.name
            };

            // --- Lógica de Validación de Duplicados ---
            const sourceData = (typeof TABLE_CACHE !== 'undefined' && TABLE_CACHE.data) 
                                ? TABLE_CACHE.data 
                                : (typeof originalData !== 'undefined' ? originalData : []);

            if (sourceData.length > 0) {
                /**
                 * Limpiador de montos para comparación:
                 * 1. Elimina todo lo que no sea número, punto o coma.
                 * 2. Toma solo la parte entera (antes del separador decimal).
                 * 3. Retorna solo los dígitos de esa parte entera.
                 */
                const getIntegerPart = (val) => {
                    if (!val) return "";
                    // Quitamos espacios y símbolos, dejamos solo números y separadores
                    let s = String(val).replace(/[^\d.,]/g, "");
                    // Buscamos el último separador (punto o coma) que represente decimales
                    // Si hay un separador a 2 posiciones del final, lo tomamos como inicio de decimales
                    let lastDot = s.lastIndexOf('.');
                    let lastComma = s.lastIndexOf(',');
                    let splitIdx = Math.max(lastDot, lastComma);
                    
                    // Si el separador está muy cerca del final (posible decimal), cortamos ahí
                    if (splitIdx > s.length - 4 && splitIdx !== -1) {
                        s = s.substring(0, splitIdx);
                    }
                    
                    // Retornamos solo los dígitos de la parte entera resultante
                    return s.replace(/\D/g, "");
                };

                const nuevoFact   = String(registroPdf.TD201FACTURA || "").trim();
                const nuevaEmp    = String(registroPdf.TD201EMPRESA || "").trim().toUpperCase();
                
                // Obtenemos solo la parte entera del monto del PDF
                const nuevoMontoInt = getIntegerPart(registroPdf.TD201MONTOTOTAL);

                const esDuplicado = sourceData.some(row => {
                    const filaFact  = String(row.TD201FACTURA || "").trim();
                    const filaEmp   = String(row.TD201EMPRESA || "").trim().toUpperCase();
                    
                    // Obtenemos solo la parte entera del monto de la tabla
                    const filaMontoInt = getIntegerPart(row.TD201MONTOTOTAL);

                    // Comparamos Factura, Empresa y PARTE ENTERA del monto
                    return (filaFact === nuevoFact && filaEmp === nuevaEmp && filaMontoInt === nuevoMontoInt);
                });

                if (esDuplicado) {
                    const msg = `<b>¡POSIBLE DUPLICADO DETECTADO!</b><br><br>` +
                                        `<div class="text-left inline-block">` +
                                    `• <b>Empresa:</b> ${nuevaEmp}<br>` +
                                    `• <b>Proforma:</b> ${nuevoFact}<br>` +
                                    `• <b>Monto:</b> ${registroPdf.TD201MONTOTOTAL}` +
                                `</div><br><br>` +
                                `¿Desea procesarlo de todos modos?`;

                    const continuar = await showSystemModal({ 
                        title: 'Validación de Duplicados', 
                        text: msg, 
                        type: 'warning',
                        showCancel: true 
                    });
                    
                    if (!continuar) return;
                }
            }

            // --- NORMALIZACIÓN PARA INPUTS DATE (AJUSTE SMED) ---
            // Convertimos DD/MM/YYYY a YYYY-MM-DD para activar el modal nativo
            Object.keys(registroPdf).forEach(key => {
                const cleank = key.toUpperCase();
                // Validamos que sea un campo de fecha o periodo (en SMED TD201PERIODO es fecha única)
                if (cleank.includes('FECHA') || cleank.includes('DATE') || cleank.endsWith('PERIODO') || cleank.includes('EMISION')) {
                    const val = registroPdf[key];
                    if (val && val.includes('/')) {
                        const p = val.split('/');
                        // Manejo de años de 2 o 4 dígitos (común en SMED)
                        if (p.length === 3) {
                            const year = p[2].length === 2 ? `20${p[2]}` : p[2];
                            registroPdf[key] = `${year}-${p[1]}-${p[0]}`;
                        }
                    }
                }
            });

            localStorage.setItem('DATA_PDF', JSON.stringify(registroPdf));
            renderPdfAsEditable(registroPdf);

        } catch (error) {
            console.error("Error crítico en processAndShowModalSMED:", error);
            await showSystemModal({ 
                title: 'Error de Procesamiento', 
                text: 'No se pudo leer el contenido del PDF SMED.', 
                type: 'danger' 
            });
        }
    }

    async function generarYVincularPdf() {
        // Llamada a tu función de GAS
        const nombrePdfGenerado = await runGoogleScript('registroPdf', [datosActuales]);

        if (nombrePdfGenerado) {
            // Buscamos el input del campo TD101ARCHIVO
            const inputArchivo = document.querySelector('[data-field="TD101ARCHIVO"]');
            
            if (inputArchivo) {
                inputArchivo.value = nombrePdfGenerado;
                // Si quieres guardarlo de una vez en el payload de saveRecord:
                payload['TD101ARCHIVO'] = nombrePdfGenerado;
            }
            
            console.log("Archivo vinculado: " + nombrePdfGenerado);
        }
    }

function renderPdfAsEditable(row) {
    normalizeToolbar();
    ['Duplicar', 'Borrar', 'Nuevo', 'Editar'].forEach(disableButton);
    
    document.getElementById('btn-modal-save')?.classList.remove('hidden');
    document.getElementById('btn-modal-cancel')?.classList.remove('hidden');
    document.getElementById('btn-modal-return')?.classList.add('hidden');

    const btnCancel = document.getElementById('btn-modal-cancel');
    if (btnCancel) {
        btnCancel.onclick = () => {
            cancelActualForm(); 
        };
    }

    const firstKey = Object.keys(row)[0] || "";
    const tablePrefix = firstKey.substring(0, 5).toUpperCase();
    const idFieldName = tablePrefix + "ID";
    
    window.currentTableName = tablePrefix + "_MAIN";

    const content = document.getElementById('detail-modal-content');
    const title = document.getElementById('detail-modal-title');
    const configMapRaw = JSON.parse(localStorage.getItem('TABLE_CONFIG') || '{}');
    const configMap = {};
    Object.keys(configMapRaw).forEach(k => configMap[k.toUpperCase()] = configMapRaw[k]);

    content.innerHTML = '';
    title.innerHTML = `
        <div class="flex items-center justify-end w-full px-2 py-1">
            <div class="flex items-center gap-2">
                <span id="title-badge-mode" class="px-2 py-0.5 rounded-full text-[10px] font-bold uppercase bg-blue-500/20 text-blue-400 border border-blue-500/30">
                    BORRADOR (${tablePrefix === 'TD101' ? 'HCM' : 'SMED'})
                </span>
                <i data-lucide="file-text" class="w-5 h-5 text-blue-400"></i>
            </div>
        </div>`;

    const ERROR_CLASSES = ["border-red-600", "text-yellow-500", "ring-1", "ring-red-600/50"];
    const NORMAL_CLASSES = ["border-transparent", "text-gray-100"];

    Object.keys(row).forEach(key => {
        const cleanKey = key.toUpperCase();
        if (cleanKey.includes('REGISTRO') || cleanKey === idFieldName) return;
        
        const cfg = configMap[cleanKey] || {};
        const visValue = String(cfg.visible || '').toLowerCase().trim();
        if (visValue === "") return;

        const isEditable = visValue === 'x' && cfg.editable !== false && cfg.Es_Calculado !== true;
        const isRequired = cfg.Es_Obligatorio === true || String(cfg.Es_Obligatorio).toLowerCase() === "true";
        const asterisco = isRequired ? '<span class="text-red-500 ml-1 font-bold">*</span>' : '';

        // --- DETECCIÓN DE TIPOS DE CAMPO ---
        // Excluimos PERIODOFACT de ser tipo date porque contiene texto (" al ")
        const isDateField = (cleanKey.includes('FECHA') || cleanKey.includes('DATE') || cleanKey.endsWith('PERIODO') || cleanKey.includes('VIGENCIA') || cleanKey.includes('EMISION')) 
                            && !cleanKey.includes('PERIODOFACT');
        
        const isNumericField = cleanKey.includes('MONTO') || cleanKey.includes('PRIMA') || cleanKey.includes('IMPUESTO') || cleanKey.includes('BRUTO');

        const item = document.createElement('div');
        item.className = 'grid grid-cols-[110px_1fr] px-2 py-1 border-b border-gray-800/50 last:border-0 hover:bg-white/5 justify-items-start';
        
        const val = row[key] || '';
        const esError = String(val).toUpperCase() === "NO DETECTADO";
        
        if (isEditable) {
            const tempDiv = document.createElement('div');
            tempDiv.className = "w-full";
            
            const inputEl = document.createElement('input');
            inputEl.dataset.field = key;
            
            // 1. Configurar TIPO
            inputEl.type = isDateField ? 'date' : 'text';

            // 2. Configurar VALOR (Si es date, convertir DD/MM/YYYY a YYYY-MM-DD)
            if (isDateField && val.includes('/')) {
                inputEl.value = val.split('/').reverse().join('-');
            } else {
                inputEl.value = val;
            }

            // 3. Configurar ESTILOS
            inputEl.className = `bg-gray-800/50 border rounded px-2 py-0 text-sm font-bold w-full focus:outline-none transition-all duration-200 ${esError ? ERROR_CLASSES.join(' ') : NORMAL_CLASSES.join(' ')}`;
            
            if (isNumericField) {
                inputEl.classList.add('text-right');
            } else if (!isDateField) {
                inputEl.classList.add('uppercase');
            }

            // 4. EVENTOS
            inputEl.addEventListener('input', function() {
                // Limpieza de error visual
                if (this.value !== "" && this.value.toUpperCase() !== "NO DETECTADO") {
                    this.classList.remove(...ERROR_CLASSES);
                    this.classList.add(...NORMAL_CLASSES);
                }
                // Máscara contable si aplica
                if (isNumericField) applyAccountingMask(this);
            });

            tempDiv.appendChild(inputEl);
            item.appendChild(tempDiv);
        } else {
            // Modo Lectura (Bloqueado)
            const wrapper = document.createElement('div');
            wrapper.className = "w-full";
            wrapper.innerHTML = `
                <div class="flex items-center h-[24px] px-2 w-full justify-between">
                    <span class="text-sm font-bold uppercase ${esError ? 'text-yellow-500' : 'text-gray-500'} opacity-90">${val}</span>
                    <input type="hidden" data-field="${key}" value="${val}">
                    <i data-lucide="lock" class="w-3.5 h-3.5 text-gray-700"></i>
                </div>`;
            item.appendChild(wrapper);
        }

        item.insertAdjacentHTML('afterbegin', `<span class="text-gray-400 font-medium uppercase text-[10px] self-start flex items-center">${cfg.label || key}${asterisco}</span>`);
        content.appendChild(item);
    });

    document.getElementById('detail-modal').classList.remove('hidden');
    if (window.lucide) lucide.createIcons();
}

    function exportCurrentTableToExcel() {
        try {
            // 1. Obtener la data desde la variable global que alimenta renderTable
            const dataToExport = (typeof TABLE_CACHE !== 'undefined' && TABLE_CACHE.data) 
                                ? TABLE_CACHE.data 
                                : (typeof originalData !== 'undefined' ? originalData : null);

            if (!dataToExport || dataToExport.length === 0) {
                alert("No hay datos cargados para exportar.");
                return;
            }

            const configMap = JSON.parse(localStorage.getItem('TABLE_CONFIG') || '{}');

            // 2. Transformación: Aplicamos las mismas reglas que renderTable
            const cleanData = dataToExport.map(row => {
                const newRow = {};
                
                // Usamos columnOrder para respetar el orden de la tabla visual
                tableConfig.columnOrder.forEach(h => {
                    const cleanH = h.toUpperCase();
                    const cfg = configMap[h] || {};

                    // Solo exportamos lo que es visible (X o XX)
                    const vis = String(cfg.visible || '').toLowerCase();
                    if (vis !== 'x' && vis !== 'xx') return;
                    if (cleanH.endsWith('TYPEREG')) return;

                    // --- LÓGICA DE FORMATEO (Igual a renderTable) ---
                    let val = row[h];

                    // A. Formateo de Fecha (DD/MM/YYYY)
                    if (cleanH.includes('FECHA') || cleanH.includes('DATE') || cleanKey.endsWith('PERIODO')) {
                        const d = new Date(row[h]);
                        if (!isNaN(d.getTime())) {
                            val = `${String(d.getDate()).padStart(2, '0')}/${String(d.getMonth() + 1).padStart(2, '0')}/${d.getFullYear()}`;
                        }
                    } 
                    // B. Formateo General (getFormattedValue)
                    else if (typeof getFormattedValue === 'function') {
                        val = getFormattedValue(h, row[h]);
                    }

                    // Usamos el Label para el encabezado del Excel
                    const label = tableConfig.displayMap[h] || h;
                    newRow[label] = val;
                });
                return newRow;
            });

            // 3. Crear Excel con SheetJS
            const wb = XLSX.utils.book_new();
            const ws = XLSX.utils.json_to_sheet(cleanData);

            // 4. Estética: Auto-ajuste de columnas
            const colWidths = Object.keys(cleanData[0] || {}).map(key => ({
                wch: Math.max(key.length, 18)
            }));
            ws['!cols'] = colWidths;

            // 5. Nombre del archivo
            const tableName = (typeof currentTableName !== 'undefined' ? currentTableName : "REPORTE").replace("_MAIN", "");
            const fileName = `${tableName}_${new Date().toISOString().slice(0,10)}.xlsx`;

            XLSX.utils.book_append_sheet(wb, ws, "Datos Formateados");
            XLSX.writeFile(wb, fileName);

            console.log(`%c✅ Exportación con formato completada: ${fileName}`, "color: #10b981; font-weight: bold;");

        } catch (error) {
            console.error("Error en exportación formateada:", error);
            alert("Error al generar el Excel formateado.");
        }
    }

    function extractRaw(text, regex, group = 1) {
        if (!text) return "No detectado";
        const match = text.match(regex);
        return (match && match[group]) ? match[group].replace(/\s+/g, ' ').trim() : "No detectado";
    }

    function refreshNewButtonConfig() {
        const btnNew = document.getElementById('btn-main-add-record');
        if (!btnNew) return;

        // 1. Configuramos el comportamiento según la tabla actual
        if (currentTableName === 'TD101_MAIN') {
            btnNew.title = "Nuevo desde PDF";
            btnNew.innerHTML = `<i data-lucide="file-plus-2" class="w-6 h-6"></i>`;
            btnNew.onclick = (e) => {
                e.preventDefault();
                triggerPdfUpload();
            };
        } else if (currentTableName === 'TD102_POLIZAS') {
            btnNew.title = "Nuevo Registro";
            btnNew.innerHTML = `<i data-lucide="plus-circle" class="w-6 h-6"></i>`;
            btnNew.onclick = (e) => {
                e.preventDefault();
                showRegisterMode();
            };
        }

        // 2. Refrescamos el icono (importante)
        if (window.lucide) lucide.createIcons();
    }
    
</script>
