        bp.onclick = () => close(true);
        ac.appendChild(bp);

        m.classList.remove('hidden');
        if (window.lucide) lucide.createIcons();
    });
}

    async function deleteRecord() {
        // 1. EXTRACCIÓN DE DATOS DE USUARIO Y REGISTRO
        const usuarioLogueadoId = String(localStorage.getItem('Usuario_ID') || "").trim();
        const perfilUsuario = String(localStorage.getItem('Usuario_Perfil') || "").trim().toUpperCase();
        const idxCorrecto = String(localStorage.getItem('Usuario_Idx') || "").trim();

        const tableData = JSON.parse(localStorage.getItem('TABLE_DATA') || '{}');
        const row = tableData.DATOS_REGISTRO; 
        const tableOrigin = tableData.TABLA_ORIGEN || currentTableName;
        
        if (!row || !tableOrigin) {
            console.error("Error: No hay datos de registro cargados.");
            return;
        }

        const prefix = tableOrigin.split('_')[0].toUpperCase();
        const recordId = row[`${prefix}ID`];
        const registroOwner = String(row[`${prefix}RegistroUser`] || "").trim();
        const movTipo = String(row[`${prefix}MOVIMIENTO`] || '').toUpperCase();
        const referencia = String(row[`${prefix}REF`] || '').toUpperCase();

        // 2. LÓGICA DE PERMISOS (Seguridad Original)
        const esAdmin = (perfilUsuario === 'ADMIN');
        const esPropietario = (registroOwner !== "" && registroOwner === usuarioLogueadoId);

        console.log("--- Validación de Seguridad ---", { usuarioLogueadoId, registroOwner, esAdmin, esPropietario });

        if (!esPropietario && !esAdmin) {
            await showSystemModal({ 
                title: 'Acceso Denegado', 
                text: `Solo el propietario (${registroOwner}) o un Administrador pueden eliminar este registro.`, 
                type: 'warning' 
            });
            return;
        }

        // 3. VALIDACIÓN DE NEGOCIO (Lógica Reciente: Impedir borrar hijos)
        if (movTipo !== 'TRANSFERENCIA' && referencia.includes('TRANSFERENCIA ')) {
            await showSystemModal({
                title: 'Acción Bloqueada',
                text: `Este registro es un asiento vinculado a la <b>${referencia}</b>.<br><br>Para eliminarlo, debe localizar y eliminar el registro original de tipo TRANSFERENCIA.`,
                type: 'warning'
            });
            return;
        }

        // 4. CONFIRMACIÓN CON PIN (IDX)
        const esPadre = (movTipo === 'TRANSFERENCIA');
        const mensajeConfirmacion = esPadre 
            ? 'Esta es una <b>TRANSFERENCIA</b>. Al eliminarla, se borrarán automáticamente los asientos de Débito y Crédito asociados.<br><br>Ingrese su Idx de Seguridad:'
            : 'Este registro se moverá al historial de borrados. Ingrese su Idx de Seguridad:';

        const pinIngresado = await showSystemModal({
            title: 'Confirmar Eliminación',
            text: mensajeConfirmacion,
            type: 'danger', 
            isPrompt: true,
            inputType: 'password',
            placeholder: 'PIN de seguridad...',
            // Agregamos o modificamos la propiedad del icono aquí:
            inputIcon: 'eye-off' // Lucide lo renderizará si tu modal usa lucide.createIcons()
        });

        if (pinIngresado === null) return; // Canceló

        if (String(pinIngresado).trim() !== idxCorrecto) {
            await showSystemModal({ 
                title: 'Error de Seguridad', 
                text: 'El Idx de Seguridad es incorrecto. Operación cancelada.', 
                type: 'warning' 
            });
            return;
        }

        // 5. PROCESAMIENTO Y ENVÍO (Payload Fiel al Backend)
        toggleGlobalLoader(true, "Eliminando...", "Sincronizando con el servidor GAS.");

        const finalPayload = {
            action: esPadre ? 'deleteTransferCascade' : 'deleteDynamicDataTD',
            // SIN comillas para que use la constante:
            tiendaId: localStorage.getItem(KEYS.TIENDA_ID), 
            TABLA_DESTINO: tableOrigin,
            [prefix + 'ID']: recordId,
            REF_CASCADE: esPadre ? `TRANSFERENCIA ${recordId}` : '',
            currentUser: usuarioLogueadoId
        };

        // Si no es cascada, incluimos parámetros para borrado simple por compatibilidad
        if (!esPadre) {
            finalPayload.CAMPO_CLAVE = `${prefix}ID`;
            finalPayload.ID_VALUE = recordId;
        }

        try {
            const success = await executeSubmit(finalPayload);

            if (success) {
                needsRefresh = true;
                await fetchData(tableOrigin);
                document.getElementById('detail-modal')?.classList.add('hidden');
                toggleGlobalLoader(false);
                await showSystemModal({ 
                    title: 'Proceso Completado', 
                    text: 'Registro eliminado correctamente.', 
                    type: 'info' 
                });
            } else {
                toggleGlobalLoader(false);
            }
        } catch (error) {
            toggleGlobalLoader(false);
            console.error("Error crítico en deleteRecord:", error);
            await showSystemModal({ 
                title: 'Error Crítico', 
                text: 'No se pudo conectar con el servidor.', 
                type: 'danger' 
            });
        }
    }

    /**
     * Envía datos al servidor GAS y gestiona la respuesta global
     * @param {Object} payload - Datos a enviar al servidor
     * @returns {Object|Boolean} - Devuelve el objeto creado/editado si tiene éxito, false si falla.
     */
    async function executeSubmit(payload) {
        // 1. Efecto visual inicial
        window.scrollTo({ top: 0, behavior: 'smooth' });

        // 2. Definición dinámica de textos según la acción para el Loader
        let title = "Procesando Solicitud...";
        let desc = "Sincronizando con la base de datos GAS...";

        const action = String(payload.action || '').toLowerCase();
       
        if (action.includes('delete')) {
            title = "Eliminando Registro...";
            desc = "Eliminando el registro seleccionado del servidor...";
        } else if (action.includes('edit')) {
            title = "Actualizando Datos...";
            desc = "Guardando cambios realizados en el registro...";
        } else if (action.includes('register')) {
            title = "Guardando Nuevo Registro...";
            desc = "Creando registro en la base de datos...";
        }

        // 3. Activación del Loader Global
        toggleGlobalLoader(true, title, desc);

        try {
            // Aseguramos que siempre viaje el ID de la tienda si no viene en el payload
            if (!payload.tiendaId) {
                payload.tiendaId = localStorage.getItem(KEYS.TIENDA_ID);
            }

            const r = await fetch(GAS_URL, { 
                method: 'POST', 
                // Cambiar a JSON suele ser más estable para Apps Script con payloads complejos
                body: JSON.stringify(payload),
                headers: {
                    'Content-Type': 'text/plain;charset=utf-8', // Evita problemas de CORS Preflight
                }
            });
            
            const res = await r.json();

            // 5. Gestión de la Respuesta
            if (res.success) {
                // Sincronización inmediata del registro en el estado local (localStorage)
                if (res.data) {
                    const currentData = JSON.parse(localStorage.getItem('TABLE_DATA') || '{}');
                    currentData.DATOS_REGISTRO = res.data; 
                    localStorage.setItem('TABLE_DATA', JSON.stringify(currentData));
                }

                // IMPORTANTE: Retornamos la data para que funciones como saveRecord 
                // puedan usar el ID generado (ej. para transferencias)
                return res.data || true; 

            } else {
                // Error controlado por el servidor (ej. validaciones de base de datos)
                toggleGlobalLoader(false);
                await showSystemModal({ 
                    title: 'Atención', 
                    text: res.message || 'El servidor denegó la operación.', 
                    type: 'warning' 
                });
                return false;
            }

        } catch (err) {
            // Error técnico (ej. pérdida de conexión, error de script)
            toggleGlobalLoader(false);
            console.error("Error técnico en executeSubmit:", err);
            await showSystemModal({ 
                title: 'Error de Aplicación', 
                text: `No se pudo conectar con el servidor: ${err.message}`, 
                type: 'danger' 
            });
            return false;
        }
    }

    function normalizeToolbar() {
        const ids = ['btn-modal-save', 'btn-modal-cancel', 'btn-modal-return'];
        const titles = ['Duplicar', 'Borrar', 'Nuevo', 'Editar'];

        const allButtons = [
            ...ids.map(id => document.getElementById(id)), 
            ...titles.map(t => document.querySelector(`[title="${t}"]`))
        ];

        allButtons.forEach(btn => {
            if (btn) {
                btn.classList.remove('hidden', 'btn-disabled', 'opacity-20', 'grayscale', 'bg-red-500', 'bg-blue-500');
                btn.style.cssText = 'pointer-events: auto; cursor: pointer; opacity: 1;';
                const icon = btn.querySelector('i');
                if (icon) icon.classList.remove('opacity-50');
            }
        });

        // Visibilidad por defecto: Solo "Regresar" visible
        document.getElementById('btn-modal-save')?.classList.add('hidden');
        document.getElementById('btn-modal-cancel')?.classList.add('hidden');
        document.getElementById('btn-modal-return')?.classList.remove('hidden');

        // Re-vinculación limpia
        document.getElementById('btn-modal-save').onclick = (e) => { e.preventDefault(); saveRecord(); };
        document.getElementById('btn-modal-cancel').onclick = (e) => { e.preventDefault(); cancelActualForm(); };
        document.getElementById('btn-modal-return').onclick = (e) => { e.preventDefault(); closeDetailModal(); };
        
        // Vinculación por títulos (Usa selectores opcionales para evitar errores si el botón no existe en el DOM)
        const assignClick = (title, fn) => {
            const btn = document.querySelector(`[title="${title}"]`);
            if (btn) btn.onclick = (e) => { e.preventDefault(); fn(); };
        };

        assignClick('Nuevo', showRegisterMode);
        assignClick('Editar', showEditMode);
        assignClick('Duplicar', duplicateCurrentRecord);
        assignClick('Borrar', deleteRecord);

        if (window.lucide) lucide.createIcons();
    }

    async function cancelActualForm() {
        const storageData = JSON.parse(localStorage.getItem('TABLE_DATA') || '{}');
        const originalRow = storageData.DATOS_REGISTRO; // null si es registro nuevo
        
        // 1. Detectar si hay cambios en los inputs
        const currentInputs = document.querySelectorAll('#detail-modal-content [data-field]');
        let hasChanges = false;

        currentInputs.forEach(input => {
            const field = input.getAttribute('data-field');
            const rawInputVal = input.hasAttribute('data-raw') ? input.getAttribute('data-raw') : input.value;
            const currentValue = String(rawInputVal || "").trim();
            const originalValue = originalRow && originalRow[field] !== undefined ? String(originalRow[field]).trim() : "";

            // Normalización para evitar falsos positivos en valores nulos o vacíos
            const isActuallyDifferent = (currentValue !== originalValue) && 
                                        !(currentValue === "" && (originalValue === "null" || originalValue === "undefined" || originalValue === "0"));

            if (isActuallyDifferent) {
                if (!originalRow && (currentValue === "0" || currentValue === "")) return;
                hasChanges = true;
            }
        });

        // 2. Si hay cambios, pedimos confirmación usando tu SystemModal
        if (hasChanges) {
            const confirmed = await showSystemModal({
                title: 'Cambios Pendientes',
                text: '¿Estás seguro de que deseas descartar los cambios o avances?',
                type: 'warning',
                showCancel: true
            });
            
            if (!confirmed) return; // El usuario decidió quedarse
        }

        // 3. Lógica de retorno
        if (originalRow) {
            openDetailModal(originalRow);
        } else {
            closeDetailModal();
            renderTable(originalData); 
        }
    }

    function closeDetailModal() {
        normalizeToolbar(); // Reset antes de cerrar para evitar "memoria" de estados

        const modal = document.getElementById('detail-modal');
        if (modal) modal.classList.add('hidden');
        
        if (needsRefresh) {
            fetchData(currentTableName).then(() => {needsRefresh = false; });
        }
        localStorage.removeItem('TABLE_DATA_REGISTRO'); 
    }

    function openDetailModal(row) {
        // 1. Inicialización de estado
        needsRefresh = false;
        const configMapRaw = JSON.parse(localStorage.getItem('TABLE_CONFIG') || '{}');
        
        const configMap = {};
        Object.keys(configMapRaw).forEach(k => configMap[k.toUpperCase()] = configMapRaw[k]);

        // 2. Normalización de la Barra de Herramientas
        normalizeToolbar();
        ['Cancelar'].forEach(disableButton);
        
        // 3. Ajuste estético para Modo Lectura
        document.getElementById('btn-modal-save')?.classList.add('hidden');
        document.getElementById('btn-modal-cancel')?.classList.add('hidden');
        document.getElementById('footer-save-container')?.classList.add('hidden');

        // 4. Preparación de contenedores y prefijos
        const content = document.getElementById('detail-modal-content');
        const title = document.getElementById('detail-modal-title');
        const tablePrefix = currentTableName.split('_')[0].toUpperCase();
    
        // --- DETECCIÓN DE LÓGICA DE TRANSFERENCIA ---
        const movTipo = String(row[tablePrefix + 'MOVIMIENTO'] || '').toUpperCase();
        const valorRef = String(row[tablePrefix + 'REF'] || '').toUpperCase();
        const isTransferRelated = movTipo === 'TRANSFERENCIA' || valorRef.includes('TRANSFERENCIA ');

        // 5. Renderizado del Título Dinámico
        content.innerHTML = '';
        const rawStatus = row[tablePrefix + 'TYPEREG'] || "Registrado";
        const isActuallyBlocked = String(rawStatus).toUpperCase() === "BLOQUEADO";
        
        const statusClass = isTransferRelated ? "opacity-30 cursor-not-allowed" : "cursor-pointer hover:bg-white/10 rounded-full transition-all";
        const statusTitle = isTransferRelated ? "Las transferencias no pueden bloquearse" : "Cambiar Estatus";

        title.innerHTML = `
            <div class="grid grid-cols-[1fr_90px_20px] items-center w-full gap-2">
                <div class="min-w-10 flex justify-start">
                    <span class="text-xl font-bold text-gray-500 tracking-tight mr-4">Doc: </span>
                    <span class="text-blue-400 text-2xl font-bold truncate">${row[tablePrefix + 'ID'] || 'Detalle'}</span>
                </div>
                <div class="flex justify-center min-w-0">
                    <span id="badge-status" class="text-[10px] px-2 py-0.5 rounded-full uppercase font-bold tracking-wider border truncate ${
                        isActuallyBlocked 
                        ? 'bg-red-500/20 text-red-400 border-red-500/30' 
                        : 'bg-green-500/20 text-green-400 border-green-500/30'
                    }">${rawStatus}</span>
                </div>
                <div id="status-icon-container" class="flex justify-end ${statusClass}" title="${statusTitle}">
                    <i data-lucide="${isActuallyBlocked ? 'lock' : 'check-circle'}" class="w-5 h-5 ${isActuallyBlocked ? 'text-red-400' : 'text-green-400'}"></i>
                </div>
            </div>`;

        if (!isTransferRelated) {
            const statusBtn = document.getElementById('status-icon-container');
            if (statusBtn) statusBtn.onclick = () => toggleStatus(row);
        }

        // 6. Renderizado de Campos de Datos
        Object.keys(row).forEach(key => {
            const cleanKey = key.toUpperCase();
            const idFieldName = tablePrefix + 'ID';
            const refFieldName = tablePrefix + 'REF';
            
            // --- FILTROS DE EXCLUSIÓN ---
            if (cleanKey.includes('TYPEREG') || cleanKey === idFieldName || cleanKey.includes('REGISTRO')) return;
            if (cleanKey.endsWith('CUENTA2') && movTipo !== 'TRANSFERENCIA') return;

            const cfg = configMap[cleanKey] || {};
            const visibility = String(cfg.visible || '').toLowerCase().trim();
            const isForced = cleanKey.includes('REGISTRO') || cleanKey.includes('MOVIMIENTO');

            if (visibility !== 'x' && visibility !== 'xx' && !isForced) return;

            // --- DETECCIÓN DE TIPO DE CAMPO ---
            const isNumeric = cleanKey.includes('IMPORTE') || cleanKey.includes('MONTO') || cleanKey.includes('PRIMA') || cleanKey.includes('TASAREF');
            const isDescription = cleanKey.includes('DESCRIPCION');
            const isNormalCase = cleanKey.includes('CONFIG');
            const isLockedRef = cleanKey === refFieldName && valorRef.includes('TRANSFERENCIA');

            const item = document.createElement('div');
            item.className = `grid grid-cols-[110px_1fr] px-2 py-1 border-b border-gray-800/50 last:border-0 hover:bg-white/5 justify-items-start ${isDescription ? 'items-start' : 'items-center'}`;
            
            let valueHTML = '';

            if (isDescription) {
                valueHTML = `
                    <textarea 
                        readonly 
                        tabindex="-1"
                        class="bg-gray-500/10 border border-transparent rounded px-2 py-0 text-sm text-white font-bold w-full resize-none pointer-events-none select-none uppercase"
                        style="height: 60px; text-align: left !important; display: block !important;"
                    >${row[key] || ''}</textarea>`;
            } else if (isLockedRef) {
                valueHTML = `
                    <div class="flex items-center h-[24px] px-2 py-0 w-full justify-between bg-orange-500/5 rounded border border-orange-500/10">
                        <span class="text-sm font-bold uppercase tracking-tight text-orange-400/80 truncate">
                            ${getFormattedValue(key, row[key])}
                        </span>
                        <i data-lucide="lock-keyhole" class="w-3.5 h-3.5 text-orange-500/50 ml-2"></i>
                    </div>`;
            } else {
                // --- MEJORA DE ALINEACIÓN PARA NÚMEROS ---
                const textColor = isForced ? 'text-blue-400' : 'text-white';
                const alignmentClass = isNumeric ? 'text-right pr-2' : 'text-left';
                const alignmentStyle = isNumeric ? 'text-align: right !important;' : 'text-align: left !important;';

                valueHTML = `
                    <span class="${textColor} font-bold px-2 py-0 text-sm block w-full ${alignmentClass} ${isNormalCase ? 'normal-case' : 'uppercase'}" 
                        style="${alignmentStyle}">
                        ${getFormattedValue(key, row[key])}
                    </span>`;
            }
                
            item.innerHTML = `
                <span class="text-gray-200 font-medium uppercase text-[10px] text-left ${isDescription ? 'pt-0' : 'self-center'}" style="text-align: left !important;">
                    ${cfg.label || key}
                </span>
                ${valueHTML}`;
                
            content.appendChild(item);
        });

        // 7. Mostrar Modal y Refrescar Iconos
        const modal = document.getElementById('detail-modal');
        if (modal) modal.classList.remove('hidden');
        
        if (window.lucide) {
            lucide.createIcons();
        }
    }

    function disableButton(title) {
        const btn = document.querySelector(`button[title="${title}"]`);
        if (btn) {
            // 1. Matamos la funcionalidad
            btn.onclick = null;
            
            // 2. Bloqueamos TODA interacción del ratón (esto anula el hover automáticamente)
            btn.style.pointerEvents = 'none'; 
            
            // 3. Bajamos la opacidad mucho más para que el color original se "lave"
            // Al estar al 20%, el verde o azul se verán como un gris muy suave
            btn.classList.add('opacity-20', 'grayscale'); 
            
            // 4. Cambiamos el cursor para que no parezca clickeable
            btn.style.cursor = 'default';
        }
    }

    function updateMetrics(dataToUse = null) {
        // Si no se pasan datos, usamos originalData como fallback inicial
        const dataSource = dataToUse || originalData;
        
        if (!dataSource || dataSource.length === 0) {
            // Opcional: Podrías resetear los textos a 0,00 aquí si dataSource está vacío
            return;
        }

        const firstRow = originalData[0]; // Usamos originalData solo para mapear las llaves
        const keys = Object.keys(firstRow);
        
        const colImporte = keys.find(k => k.toUpperCase().endsWith('MONTOTOTAL'));
        const colMovimiento = keys.find(k => k.toUpperCase().endsWith('MOVIMIENTO'));
        const colMoneda = keys.find(k => k.toUpperCase().endsWith('MONEDA'));
        const colTypeReg = keys.find(k => k.toUpperCase().endsWith('TYPEREG')); 

        if (!colImporte || !colMovimiento || !colMoneda) return;

        // FILTRADO DE NEGOCIO (Sobre los datos ya filtrados por el usuario)
        const filtered = dataSource.filter(row => {
            // 1. Validar Moneda
            const monedaMatch = row[colMoneda] === currentCurrency;
            if (!monedaMatch) return false;

            // 2. Normalizar valores
            const movTipo = String(row[colMovimiento] || '').toUpperCase().trim();
            const estatus = String(row[colTypeReg] || '').toLowerCase().trim();

            // 3. Reglas de exclusión
            const esTransferenciaMaestra = (movTipo === 'TRANSFERENCIA');
            const estaBloqueado = estatus.includes('bloqueado');

            return !esTransferenciaMaestra && !estaBloqueado;
        });

        let totalDebitos = 0;
        let totalCreditos = 0;

        filtered.forEach(row => {
            const importe = parseFloat(row[colImporte]) || 0;
            const tipo = String(row[colMovimiento] || '').toUpperCase().trim();

            if (tipo.includes('DÉB') || tipo.includes('DEB') || tipo.includes('BAJA') || tipo.includes('EXCLUSI')) {
                totalDebitos += importe;
            } else if (tipo.includes('CRÉD') || tipo.includes('CRED') || tipo.includes('ALTA') || tipo.includes('INCLUSI') || tipo.includes('RECIBO')) {
                totalCreditos += importe;
            }
        });

        const saldoNeto = totalCreditos - totalDebitos;
        
        // --- Renderizado con useGrouping ---
        const fmt = new Intl.NumberFormat('es-ES', { 
            useGrouping: true, 
            minimumFractionDigits: 2, 
            maximumFractionDigits: 2 
        });
        
        const metricsMap = { 'Balance': saldoNeto, 'Debitos': totalDebitos, 'Abonos': totalCreditos };

        Object.keys(metricsMap).forEach(key => {
            const el = document.querySelector(`[data-metric="${key}"]`);
            if (el) {
                el.textContent = fmt.format(metricsMap[key]);
                if (key === 'Balance') {
                    el.classList.remove('text-emerald-400', 'text-red-400', 'text-white');
                    if (saldoNeto === 0) el.classList.add('text-white');
                    else el.classList.add(saldoNeto < 0 ? 'text-red-400' : 'text-emerald-400');
                }
            }
        });
    }

    function changeCurrency(currency, btnElement) {
        currentCurrency = currency;
        
        // 1. Buscamos el contenedor
        const container = document.getElementById('currency-selector');
        if (!container) return;

        // 2. Limpiamos TODOS los botones usando la función de ayuda
        container.querySelectorAll('.currency-btn').forEach(b => {
            deactivateButtonVisuals(b);
        });
        
        // 3. Activamos el botón clickeado usando la función de ayuda
        // Esto aplicará automáticamente: bg-gray-600, text-white y las sombras
        activateButtonVisuals(btnElement);

        // 4. Actualizamos los números
        updateMetrics(); 
    }

    function updateModalTitle(technicalName) {

        if (!titleElement) return;

        // 1. Recuperamos el mismo "Diccionario" que usa tu selector
        const friendlyMap = JSON.parse(localStorage.getItem('TABLE_FRIENDLY_NAMES') || '{}');

        const label = (friendlyMap[technicalName] && friendlyMap[technicalName].label) 
                    ? friendlyMap[technicalName].label 
                    : technicalName;

        //titleElement.textContent = `${label} (${technicalName})`; // opcional

    }

    function renderColumnConfig() {
        const container = document.getElementById('columns-list-container');
        const panel = document.getElementById('column-config-panel');

        // 1. Sincronizar el título del modal
        if (typeof currentTableName !== 'undefined' && currentTableName) {
            updateModalTitle(currentTableName);
        }

        if (panel && panel.classList.contains('hidden')) {
            currentHeadersConfig = []; 
        }

        // 2. Inicialización de currentHeadersConfig
        if (currentHeadersConfig.length === 0 && originalData.length > 0) {
            const rawHeaders = tableConfig.columnOrder || Object.keys(originalData[0]);
            
            const filteredHeaders = rawHeaders.filter(header => {
                const cleanKey = header.toUpperCase();
                return !cleanKey.includes('REGISTRO'); 
            });

            currentHeadersConfig = filteredHeaders.map((header, index) => {
                const colConfig = (typeof mappedConfig !== 'undefined') ? mappedConfig[header] : null;
                
                return {
                    id: header,
                    label: (tableConfig.displayMap && tableConfig.displayMap[header]) 
                            ? tableConfig.displayMap[header] 
                            : header,
                    order: index + 1,
                    visible: colConfig ? (colConfig.visible === 'x' || colConfig.visible === 'xx') : true,
                    filterValue: ""
                };
            });
        }

        // 3. Renderizado del HTML
        let html = "";
        currentHeadersConfig.forEach((col, idx) => {
            const hasFilter = col.filterValue && col.filterValue.trim() !== "";
            const isVisible = col.visible !== false;

            // --- NUEVA LÓGICA DE FORMATEO PARA EL LABEL DEL FILTRO ---
            let filterDisplay = col.filterValue;
            if (hasFilter && col.filterValue.includes('|')) {
                const [desde, hasta] = col.filterValue.split('|');
                // Si tiene ambos valores, ponemos "Desde... Hasta...", si no, solo el que tenga
                if (desde && hasta) filterDisplay = `DEL ${desde} AL ${hasta}`;
                else filterDisplay = desde || hasta;
            }
            
            html += `
                <div class="flex items-center gap-3 p-2 bg-[#1e293b] rounded border ${hasFilter ? 'border-blue-500/50 shadow-[0_0_10px_rgba(59,130,246,0.1)]' : 'border-gray-700/50'} ${!isVisible ? 'opacity-50' : ''}">
                    <div class="flex flex-row gap-1 text-gray-300 flex-shrink-0"> 
                        <button onclick="moveColumn(${idx}, -1)" ${idx === 0 ? 'disabled' : ''} class="btn-move p-1 bg-gray-700 rounded transition-colors disabled:opacity-20 hover:bg-gray-600">
                            <i data-lucide="chevron-up" class="w-4 h-4"></i>
                        </button>
                        <button onclick="moveColumn(${idx}, 1)" ${idx === currentHeadersConfig.length - 1 ? 'disabled' : ''} class="btn-move p-1 bg-gray-700 rounded transition-colors disabled:opacity-20 hover:bg-gray-600">
                            <i data-lucide="chevron-down" class="w-4 h-4"></i>
                        </button>
                    </div>
                    <div class="flex-grow min-w-0 text-left">
                        <span class="text-[12px] font-medium ${isVisible ? 'text-gray-200' : 'text-gray-500'} uppercase block truncate">${col.label}</span>
                        ${hasFilter ? `<span class="text-[10px] text-blue-400 italic block truncate font-medium">Filtro: ${filterDisplay}</span>` : ''}
                    </div>
                    <div class="flex items-center gap-3 flex-shrink-0">
                        <button onclick="setColumnFilter(${idx})" class="${hasFilter ? 'text-blue-400 hover:text-red-400' : 'text-gray-600 hover:text-blue-400'} transition-colors">
                            <i data-lucide="${hasFilter ? 'search-x' : 'search'}" class="w-4 h-4"></i>
                        </button>
                        <button onclick="updateColVis(${idx}, ${!isVisible})" class="w-5 h-5 ${isVisible ? 'bg-green-600/20 border-green-500/50' : 'bg-gray-800 border-gray-700'} border rounded flex items-center justify-center transition-all hover:scale-110">
                            <i data-lucide="check" class="w-3.5 h-3.5 ${isVisible ? 'text-green-500' : 'text-transparent'} font-black"></i>
                        </button>
                    </div>
                </div>`;
        });

        container.innerHTML = html;
        if (window.lucide) lucide.createIcons();
        panel.classList.remove('hidden');
    }

    function closeConfigPanel() {
        // 1. Restaurar filtros desde el respaldo
        if (originalFiltersBackup.length > 0) {
            currentHeadersConfig.forEach(col => {
                const backup = originalFiltersBackup.find(b => b.id === col.id);
                if (backup) {
                    col.filterValue = backup.filterValue;
                }
            });
        }

        // 2. Ocultar el panel
        document.getElementById('column-config-panel').classList.add('hidden');

        // 3. Refrescar la tabla para revertir cualquier cambio visual "volátil"
        // Esto asegura que si el usuario movió columnas o filtró y no guardó, la tabla regrese a su ser.
        if (typeof applyFiltersAndSort === 'function') {
            applyFiltersAndSort();
        }
    }

    function moveColumn(idx, dir) {
        const target = idx + dir;
        // Validar que el movimiento esté dentro de los límites del array
        if (target < 0 || target >= currentHeadersConfig.length) return;

        // Intercambio de posiciones (Swap)
        [currentHeadersConfig[idx], currentHeadersConfig[target]] = 
        [currentHeadersConfig[target], currentHeadersConfig[idx]];
        
        // Actualizamos el índice de propiedad 'order' para mantener coherencia
        currentHeadersConfig.forEach((col, i) => col.order = i + 1);
        
        // Refrescar solo el panel para ver el cambio de posición
        renderColumnConfig();
    }

    async function setColumnFilter(idx) {
        const col = currentHeadersConfig[idx];
        const isDate = col.label.toUpperCase().includes('FECHA') || col.label.toUpperCase().includes('DATE') || col.label.toUpperCase().includes('VIGENCIA');
        
        let initialValue = col.filterValue || '';

        // 1. CONVERSIÓN DE IDA (Para el modal)
        // Ahora manejamos si el valor tiene un rango "DD/MM/YYYY|DD/MM/YYYY"
        if (isDate && initialValue) {
            initialValue = initialValue.split('|').map(v => {
                return v.includes('/') ? v.split('/').reverse().join('-') : v;
            }).join('|');
        }

        const newValue = await showSystemModal({
            title: `Filtrar: ${col.label}`,
            text: isDate ? `Seleccione el rango para "${col.label}":` : `Criterio para "${col.label}":`,
            isPrompt: true,
            inputType: isDate ? 'date' : 'text',
            isRange: isDate, // <--- Esta es la funcionalidad nueva que activa el doble input
            inputValue: initialValue,
            type: 'info',
            showCancel: true
        });

        if (newValue !== null) {
            let finalValue = newValue.trim();
            
            // 2. CONVERSIÓN DE VUELTA (Para la configuración)
            // Convertimos el rango "YYYY-MM-DD|YYYY-MM-DD" de vuelta a "DD/MM/YYYY|DD/MM/YYYY"
            if (isDate && finalValue.includes('-')) {
                finalValue = finalValue.split('|').map(v => {
                    return v.includes('-') ? v.split('-').reverse().join('/') : v;
                }).join('|');
            }

            currentHeadersConfig[idx].filterValue = finalValue;
            renderColumnConfig(); 
        }
    }

    async function saveRecord() {
        toggleGlobalLoader(true, "Procesando Registro...", "Sincronizando valores en la base de datos GAS<br>Por favor, espere.");

        const container = document.getElementById('detail-modal-content');
        const inputs = container.querySelectorAll('[data-field]');
        const configMapRaw = JSON.parse(localStorage.getItem('TABLE_CONFIG') || '{}');
        const configMap = {};
        Object.keys(configMapRaw).forEach(k => configMap[k.toUpperCase()] = configMapRaw[k]);

        let missingFields = [];
        let payload = {};

        // 1. LIMPIEZA DE ERRORES VISUALES
        inputs.forEach(i => {
            i.classList.remove('border-red-500', 'bg-red-500/10');
            i.classList.add('border-transparent'); 
        });

        // 2. EXTRACCIÓN Y FORMATEO DE DATOS
        inputs.forEach(input => {
            const key = input.dataset.field;
            const cleanKey = key.toUpperCase();
            const cfg = configMap[cleanKey] || {};
            const isDate = cleanKey.includes('FECHA') || cleanKey.includes('DATE') || cleanKey.includes('EMISION') || cleanKey.includes('VIGENCIA');
            
            // Excluimos TASAREF y MONTOML2 para que no sean tratados como strings editables
            const isNumeric = (cleanKey.includes('IMPORTE') || cleanKey.includes('MONTO') || cleanKey.includes('PRIMA')) && 
                            !cleanKey.endsWith('TASAREF') && !cleanKey.endsWith('MONTOML2');
            
            const isTextArea = input.tagName.toLowerCase() === 'textarea';
            
            let value;
            if (input.hasAttribute('data-raw')) {
                value = input.getAttribute('data-raw');
            } else if (input.type === 'checkbox') {
                value = input.checked;
            } else {
                value = input.value.trim();

                if (cleanKey === 'TD101FACTURA') {
                    value = String(value);
                }

                // TRATAMIENTO PARA NÚMEROS EDITABLES (Lógica Inteligente)
                if (isNumeric && value && cleanKey !== 'TD101FACTURA') {
                    let cleanNum = String(value);
                    if (cleanNum.includes(',') && cleanNum.includes('.')) {
                        cleanNum = cleanNum.replace(/\./g, '').replace(',', '.');
                    } else if (cleanNum.includes(',')) {
                        cleanNum = cleanNum.replace(',', '.');
                    }
                    cleanNum = cleanNum.replace(/[^-0-9.]/g, '');
                    let num = parseFloat(cleanNum);
                    value = !isNaN(num) ? num : 0;
                } 
                else if (!isTextArea && !isDate && typeof value === 'string') {
                    value = value.toUpperCase();
                }
            }

            // --- FORMATEO ESTRICTO DE FECHA ---
            if (isDate && value && typeof value === 'string') {
                const isVigencia = cleanKey.includes('VIGENCIA');
                let dateOnly = value.split('T')[0].split(' ')[0].trim();
                
                if (dateOnly.includes('-')) {
                    const parts = dateOnly.split('-');
                    if (parts.length === 3 && parts[0].length === 4) {
                        value = `${parts[2]}/${parts[1]}/${parts[0]}`;
                    }
                } else {
                    value = dateOnly;
                }

                if (isVigencia && value) {
                    value = `${value} 00:00:00`;
                }
            }

            const isActuallyEmpty = (value === '' || value === null || value === undefined);

            if (cfg.Es_Obligatorio === true && isActuallyEmpty) {
                missingFields.push(cfg.label || key);
                input.classList.add('border-red-500', 'bg-red-500/10');
            }

            if (isNumeric && isActuallyEmpty) {
                payload[key] = 0;
            } else {
                payload[key] = value;
            }
        });

        // --- 3. LÓGICA DE CAMPOS CALCULADOS (TASAREF 5 dec / MONTOML2 2 dec) ---
        const montoPagado = parseFloat(payload['TD101MONTOPAGADO']) || 0;
        const montoPrima = parseFloat(payload['TD101MONTOPRIMA']) || 0;
        const montoTotal = parseFloat(payload['TD101MONTOTOTAL']) || 0;

        // Cálculo Tasa: Redondeo a 5 decimales
        let tasaCalculada = montoPrima !== 0 ? (montoPagado / montoPrima) : 0;
        payload['TD101TASAREF'] = Math.round(tasaCalculada * 100000) / 100000;

        // Cálculo Monto ML2: Redondeo a 2 decimales
        let ml2Calculado = payload['TD101TASAREF'] * montoTotal;
        payload['TD101MONTOML2'] = Math.round(ml2Calculado * 100) / 100;

        // --- 4. VALIDACIONES DE NEGOCIO ---
        const tablePrefix = currentTableName.split('_')[0].toUpperCase();
        const keyImporte = `${tablePrefix}IMPORTE`;

        if (missingFields.length > 0) {
            toggleGlobalLoader(false);
            const listaHtml = missingFields.map(field => `• ${field}`).join('<br>');
            await showSystemModal({ title: 'Campos Obligatorios', text: `Complete:<br><br>${listaHtml}`, type: 'warning' });
            return; 
        }

        if (Object.prototype.hasOwnProperty.call(payload, keyImporte)) {
            const valorImporte = parseFloat(payload[keyImporte]);
            if (isNaN(valorImporte) || valorImporte === 0) {
                toggleGlobalLoader(false);
                const inputImporte = container.querySelector(`[data-field="${keyImporte}"]`);
                if (inputImporte) inputImporte.classList.add('border-red-500', 'bg-red-500/10');
                await showSystemModal({ title: 'Importe Inválido', text: 'El campo <b>Importe</b> debe ser diferente a <b>0,00</b>.', type: 'warning' });
                return;
            }
        }

        // C. Traducción de Cuentas y Validación de Monedas
        const badgeMode = document.getElementById('title-badge-mode')?.innerText.toUpperCase() || '';
        const matrizCuentas = JSON.parse(localStorage.getItem('MATRIZ_CUENTAS_USUARIO') || "[]");
        const monedaTransaccion = String(payload[`${tablePrefix}MONEDA`] || "").trim().toUpperCase();

        const aliasEmisora = payload[`${tablePrefix}ALIASCUENTA`];
        let infoEmisora = null;

        if (aliasEmisora && matrizCuentas.length > 0) {
            infoEmisora = matrizCuentas.find(c => String(c.TD102ALIAS || c.ALIAS).trim() === String(aliasEmisora).trim());
            if (infoEmisora) {
                const monedaE = infoEmisora.TD102MONEDA;
                if (monedaTransaccion && monedaE && monedaTransaccion !== monedaE) {
                    toggleGlobalLoader(false);
                    container.querySelector(`[data-field$="ALIASCUENTA"]`)?.classList.add('border-red-500', 'bg-red-500/10');
                    await showSystemModal({ title: 'Inconsistencia de Moneda', text: `La moneda (<b>${monedaTransaccion}</b>) no coincide con la cuenta (<b>${monedaE}</b>).`, type: 'error' });
                    return;
                }
                payload[`${tablePrefix}CUENTA`] = infoEmisora.TD102ID || infoEmisora.ID;
            }
        }

        if (badgeMode.includes('TR')) {
            const aliasReceptora = payload[`${tablePrefix}CUENTA2`];
            let infoReceptora = null;
            if (aliasReceptora && matrizCuentas.length > 0) {
                infoReceptora = matrizCuentas.find(c => String(c.TD102ALIAS || c.ALIAS).trim() === String(aliasReceptora).trim());
                if (infoReceptora) {
                    payload[`${tablePrefix}CUENTA2`] = infoReceptora.TD102ID || infoReceptora.ID;
                    payload[`${tablePrefix}ALIASCUENTA2`] = aliasReceptora;
                }
            }
            if (infoEmisora && infoReceptora) {
                if ((infoEmisora.TD102ID || infoEmisora.ID) === (infoReceptora.TD102ID || infoReceptora.ID)) {
                    toggleGlobalLoader(false);
                    await showSystemModal({ title: 'Error', text: 'Cuentas origen y destino iguales.', type: 'error' });
                    return;
                }
            }
        }

        // 5. ENVÍO
        const isNewOrDuplicate = badgeMode.includes('BORRADOR') || badgeMode.includes('DUPLICADO');
        const gasAction = isNewOrDuplicate ? 'registerDynamicDataTD' : 'editDynamicDataTD';
        const userId = localStorage.getItem('Usuario_ID') || ""; 

        if (isNewOrDuplicate) {
            delete payload[`${tablePrefix}ID`];
            payload[`${tablePrefix}TYPEREG`] = "REGISTRADO";
            payload[`${tablePrefix}IDOWNER`] = userId;      
        }

        const finalPayload = {
            ...payload,
            action: gasAction,
            tiendaId: localStorage.getItem(KEYS.TIENDA_ID), 
            TABLA_DESTINO: currentTableName,
            currentUser: userId
        };



console.log("-----------------------------------------");
console.table("🚀 PAYLOAD DE SALIDA (A GAS):", finalPayload);
console.log("-----------------------------------------");

        const createdRecord = await executeSubmit(finalPayload);   

console.table("✅ RESPUESTA DEL SERVIDOR (RESULTADO):", createdRecord);        

        if (createdRecord) {
            const loaderLabel = document.querySelector('#global-loader span');
            if (loaderLabel) loaderLabel.innerHTML = "Sincronizando registros...<br>Actualizando vista de tabla.";

            needsRefresh = true; 
            await fetchData(currentTableName); 

            document.getElementById('detail-modal')?.classList.add('hidden');
            toggleGlobalLoader(false);
            
            await showSystemModal({ title: 'Proceso Completado', text: 'Solicitud ejecutada correctamente.', type: 'info' });
            if (createdRecord) openDetailModal(createdRecord);
            normalizeToolbar();
            ['Duplicar', 'Borrar', 'Nuevo', 'Editar'].forEach(disableButton);
            document.getElementById('btn-modal-save')?.classList.add('hidden');
            
        } else {
            toggleGlobalLoader(false);
            showSystemModal({ title: 'Error', text: 'No se pudo guardar el registro.', type: 'error' });
        }
    }

    async function saveCurrentConfig() {
        if (!currentTableName) return;

        // 1. Elementos de UI
        const configPanel = document.getElementById('column-config-panel');

        // 2. Resolver mappedConfig (Variable global o localStorage)
        let activeMappedConfig = (typeof mappedConfig !== 'undefined') 
            ? mappedConfig 
            : JSON.parse(localStorage.getItem('TABLE_CONFIG') || '{}');

        // --- MEJORA: Loader Personalizado ---
        toggleGlobalLoader(true, "Guardando configuración filtros", "Sincronizando Base de Datos<br>Por favor espere...");

        try {
            // --- A. ACTUALIZACIÓN DE LÓGICA LOCAL ---
            if (typeof tableConfig !== 'undefined') {
                tableConfig.columnOrder = currentHeadersConfig.map(col => col.id);
            }

            // Sincronizamos visibilidad Y el valor del filtro
            currentHeadersConfig.forEach(col => {
                if (activeMappedConfig[col.id]) {
                    activeMappedConfig[col.id].visible = col.visible ? 'X' : '';
                    // CLAVE: Guardamos el filtro para que renderColumnConfig lo lea después
                    activeMappedConfig[col.id].filterValue = col.filterValue; 
                }
            });

            // 3. Persistencia local
            const configData = JSON.stringify(currentHeadersConfig);
            localStorage.setItem(`config_${currentTableName}`, configData);
            localStorage.setItem('TABLE_CONFIG', JSON.stringify(activeMappedConfig));

            if (typeof mappedConfig !== 'undefined') {
                mappedConfig = activeMappedConfig;
            }

            // --- B. SINCRONIZACIÓN CON EL BACKEND ---
            const userId = localStorage.getItem('USUARIO_ID') || 'N/A'; 
            const userName = localStorage.getItem('NOMBRE') || 'Sin Nombre';    
            const userTienda = localStorage.getItem('TIENDA') || 'General';  
            const userTiendaID = localStorage.getItem('TIENDA_ID') || 'N/A';

            const url = `${SCRIPT_URL}?action=saveTableConfig` + 
                        `&userId=${encodeURIComponent(userId)}` + 
                        `&userName=${encodeURIComponent(userName)}` +      
                        `&userTienda=${encodeURIComponent(userTienda)}` +  
                        `&userTiendaID=${encodeURIComponent(userTiendaID)}` + 
                        `&tableName=${encodeURIComponent(currentTableName)}` + 
                        `&configData=${encodeURIComponent(configData)}`;
                            
            const response = await fetch(url);
            const result = await response.json();

            if (result.success) {
                if (configPanel) configPanel.classList.add('hidden');

                // Cerramos loader antes del modal de éxito
                toggleGlobalLoader(false);

                showSystemModal({ 
                    title: 'Proceso Completado', 
                    text: `La configuración de <b>${currentTableName}</b> se ha sincronizado correctamente.`, 
                    type: 'info' 
                });

                if (typeof applyFiltersAndSort === 'function') {
                    applyFiltersAndSort(); 
                } else if (typeof renderTable === 'function') {
                    renderTable(originalData);
                }
            }
        } catch (e) { 
            console.error("Error en saveCurrentConfig:", e);
            toggleGlobalLoader(false);
            if (typeof applyFiltersAndSort === 'function') applyFiltersAndSort();
        } finally {
            // Garantizamos que el loader se cierre siempre
            toggleGlobalLoader(false);
        }
    }

    function updateTD102Alias() {
        const content = document.getElementById('detail-modal-content');
        if (!content) return;

        const prefix = currentTableName.split('_')[0].toUpperCase();
        
        // Obtenemos valores de los campos que componen el alias
        const banco = content.querySelector(`[data-field="${prefix}BANCO"]`)?.value || '';
        const tipo = content.querySelector(`[data-field="${prefix}TIPO"]`)?.value || '';
        const moneda = content.querySelector(`[data-field="${prefix}MONEDA"]`)?.value || '';
        
        const aliasKey = "TD102ALIAS";
        const nuevoAlias = `${banco} ${tipo} ${moneda}`.replace(/\s+/g, ' ').trim().toUpperCase();
        
        const aliasInput = content.querySelector(`[data-field="${aliasKey}"]`);
        if (aliasInput) {
            aliasInput.value = nuevoAlias;

            // Actualización visual si está bloqueado (span) o es input
            const container = aliasInput.closest('div');
            const visualSpan = container?.querySelector('span'); // El span que muestra "---"
            
            if (visualSpan && visualSpan.tagName === 'SPAN') {
                visualSpan.textContent = nuevoAlias || '---';
                if (nuevoAlias) {
                    visualSpan.classList.remove('text-gray-500');
                    visualSpan.classList.add('text-blue-400/90');
                }
            }
        }
    }

    function applyCardMask(input) {
        // 1. Limpiar todo lo que no sea número
        let value = input.value.replace(/\D/g, '');
        
        // 2. Cortar a un máximo de 16 dígitos (opcional, ajusta según tu DB)
        value = value.substring(0, 16);
        
        // 3. Agrupar de a 4 usando regex
        // El match(/(.{1,4})/g) crea un array de trozos de hasta 4 caracteres
        const sections = value.match(/.{1,4}/g);
        
        if (sections) {
            input.value = sections.join('-');
        } else {
            input.value = value;
        }
    }

                            class="border rounded px-2 py-0 text-sm font-bold w-full focus:outline-none transition-all appearance-none cursor-pointer pr-8 hover:brightness-110 shadow-sm">
                            ${!existeEnOpciones ? `<option value="${valActual}" selected style="background-color: var(--bg); color: var(--txt);">${valActual || '-- SELECCIONE --'}</option>` : ''}
                            ${optionsHtml}
                        </select>
                        <div class="absolute inset-y-0 right-2 flex items-center pointer-events-none opacity-60 group-hover:opacity-100 transition-opacity">
                            <i data-lucide="search" class="w-3.5 h-3.5" style="color: var(--p-soft);"></i>
                        </div>
                    </div>`;
            }
            else if (isDate) {
                let dateISO = val ? (val.includes('/') ? val.split('/').reverse().join('-') : val.split('T')[0]) : '';
                valueElement = `<input type="date" data-field="${key}" value="${dateISO}" class="custom-date-input bg-gray-800/50 border border-transparent focus:border-gray-500 rounded px-2 py-0 text-sm text-gray-100 font-bold w-full focus:outline-none uppercase transition-colors">`;
            } 
            else if (isNumeric) {
                valueElement = `<input type="text" data-field="${key}" data-raw="${val}" value="" placeholder="${getFormattedValue(key, val)}" onfocus="setupNumericAccounting(this)" onblur="restoreNumericFormat(this, '${key}')" oninput="applyAccountingMask(this)" class="bg-gray-800/50 border border-transparent focus:border-gray-500 rounded px-2 py-0 text-sm text-gray-100 font-bold w-full text-right focus:outline-none transition-colors placeholder:text-blue-400/60">`;
            } 
            else {
                // 1. Identificamos si es el campo de descripción
                const isDescriptionField = cleanKey.includes('DESCRIPCION');
                
                // 2. Tu configuración: Borde Rojo + Fondo Azul si es Transferencia/Descripción
                const specialStyle = (isTransferRelated && isDescriptionField) 
                    ? 'border rounded border-red-500/50 bg-blue-500/10' 
                    : 'bg-gray-800/30 border border-transparent';

                if (isDescriptionField) {
                    // 3. Placeholder solo si el valor está vacío
                    const placeholderAttr = !val ? 'placeholder="Escriba una nota o referencia aquí..."' : '';
                    
                    valueElement = `
                        <textarea data-field="${key}" rows="2" ${placeholderAttr}
                            class="${specialStyle} focus:border-red-500 rounded px-2 py-1 text-sm text-gray-100 font-bold w-full focus:outline-none transition-all resize-none placeholder:text-gray-500 placeholder:italic placeholder:font-normal uppercase">${val}</textarea>`;
                } else {
                    // 4. Lógica estándar para otros campos (como NUMERO)
                    const isNumeroCard = cleanKey.endsWith('NUMERO');
                    const onInputEvent = isNumeroCard ? 'applyCardMask(this)' : 'updateTD102Alias()';
                    const maxLengthAttr = isNumeroCard ? 'maxlength="19"' : '';

                    valueElement = `
                        <input type="text" data-field="${key}" value="${val}" 
                            oninput="${onInputEvent}" ${maxLengthAttr} 
                            class="${specialStyle} focus:border-gray-500 rounded px-2 py-0 text-sm text-gray-100 font-bold w-full focus:outline-none uppercase transition-colors">`;
                }
            }

            // Renderizado final del item
            item.innerHTML = `<span class="text-gray-200 font-medium uppercase text-[10px] self-start flex items-center">${cfg.label || key}${asterisco}</span>${valueElement}`;
            content.appendChild(item);
        });

        // Aplicar formato inicial al número si existe
        const numInput = content.querySelector(`[data-field$="NUMERO"]`);
        if (numInput && typeof applyCardMask === 'function') applyCardMask(numInput);

        if (window.lucide) lucide.createIcons();
    }

    function showRegisterMode() {
        // 1. LIMPIEZA DE DATOS Y RESET DE MODO
        const tableData = JSON.parse(localStorage.getItem('TABLE_DATA') || '{}');
        const tableOrigin = tableData.TABLA_ORIGEN || currentTableName;
        const dictionary = JSON.parse(localStorage.getItem('VALUE_DICTIONARY') || '{}');
        
        localStorage.setItem('TABLE_DATA', JSON.stringify({ 
            TABLA_ORIGEN: tableOrigin,
            DATOS_REGISTRO: null 
        }));

        // 2. CONFIGURACIÓN DE INTERFAZ
        normalizeToolbar(); 
        ['Duplicar', 'Borrar', 'Nuevo', 'Editar'].forEach(disableButton);
        
        document.getElementById('btn-modal-save')?.classList.remove('hidden');
        document.getElementById('btn-modal-cancel')?.classList.add('hidden'); 
        document.getElementById('footer-save-container')?.classList.remove('hidden');
        document.getElementById('btn-modal-return')?.classList.remove('hidden');
        document.getElementById('detail-modal')?.classList.remove('hidden');

        const btnReturn = document.getElementById('btn-modal-return');
        if (btnReturn) {
            btnReturn.onclick = (e) => {
                e.preventDefault();
                cancelActualForm();
            };
        }

        const btnCancel = document.getElementById('btn-modal-cancel');
        if (btnCancel) btnCancel.onclick = () => closeDetailModal();

        const content = document.getElementById('detail-modal-content');
        const title = document.getElementById('detail-modal-title');
        
        const configMapRaw = JSON.parse(localStorage.getItem('TABLE_CONFIG') || '{}');
        const configMap = {};
        Object.keys(configMapRaw).forEach(k => {
            configMap[k.toUpperCase()] = configMapRaw[k];
        });
        
        const tablePrefix = currentTableName.split('_')[0].toUpperCase();
        const idCuentaName = `${tablePrefix}CUENTA`; // Ejemplo: TD101CUENTA
        const idPrincipalName = `${tablePrefix}ID`;   // Ejemplo: TD101ID

        content.innerHTML = '';

        // 3. TÍTULO
        title.innerHTML = `
            <div class="flex items-center justify-end w-full px-2 py-1">
                <div class="flex items-center gap-2">

                        BORRADOR NV
                    </span>
                    <i data-lucide="shield-plus" class="w-5 h-5 text-blue-400"></i>
                </div>
            </div>`;

        // 4. RENDERIZADO DINÁMICO DE CAMPOS
        Object.keys(configMap).forEach(key => {
            const cfg = configMap[key]; 
            const cleanKey = key.toUpperCase();
            
            // --- REGLA DE VISIBILIDAD ---
            const visValue = String(cfg.visible || '').toLowerCase().trim();
            if (visValue === "") return;

            // --- MANEJO DE INPUTS OCULTOS REQUERIDOS POR SAVERECORD ---
            if (cleanKey === idPrincipalName || cleanKey === idCuentaName) {
                const hiddenInput = document.createElement('input');
                hiddenInput.type = 'hidden';
                hiddenInput.dataset.field = key; 
                hiddenInput.value = ''; 
                content.appendChild(hiddenInput);
                return; 
            }

            // --- REGLAS DE EXCLUSIÓN VISUAL RESTANTES ---
            if (cleanKey.endsWith('CUENTA2') || cleanKey.endsWith('IDOWNER') || cleanKey.includes('REGISTRO') || cleanKey.includes('TYPEREG')) return;

            const isCalculated = cfg.Es_Calculado === true || String(cfg.Es_Calculado).toLowerCase() === "calc";
            const isEditable = visValue === 'x' && cfg.editable !== false && !isCalculated;

            const isRequired = cfg.Es_Obligatorio === true || String(cfg.Es_Obligatorio).toLowerCase() === "true";
            const asterisco = isRequired ? '<span class="text-red-500 ml-1 font-bold">*</span>' : '';

            // --- LÓGICA DE SELECT (DICCIONARIO + ALIASCUENTA) ---
            const currentTableClean = String(currentTableName).trim().toUpperCase();
            const dictKey = `${currentTableClean}|${cleanKey}`;
            let dictOptions = dictionary[dictKey] || [];
            
            const isAliasField = cleanKey.endsWith('ALIASCUENTA');
            
            if (isAliasField && dictOptions.length === 0) {
                dictOptions = (window.dashboardState?.cuentas || []).map(c => c.ALIAS);
            }

            const isSelect = isEditable && dictOptions && dictOptions.length > 0 && (
                cleanKey.includes('MONEDA') || cleanKey.includes('MOVIMIENTO') || cleanKey.includes('TIPO') || isAliasField
            );

            const isDescription = cleanKey.includes('DESCRIPCION');
            const isDate = cleanKey.includes('DATE') || cleanKey.includes('FECHA');
            const isNumeric = cleanKey.includes('IMPORTE') || cleanKey.includes('MONTO');

            let inputHTML = '';

                inputHTML = `
                    <div class="flex items-center h-[24px] px-2 w-full justify-between text-gray-500 font-bold uppercase opacity-70 text-sm">

            } else if (isSelect) {

                ).join('');

                inputHTML = `
                    <div class="relative w-full group px-1">
                        <select data-field="${key}" onchange="updateTD102Alias()"
                            style="background-color: var(--bg); border-color: var(--th); color: var(--p-soft);"

                        </select>

                            <i data-lucide="search" class="w-3.5 h-3.5" style="color: var(--p-soft);"></i>
                        </div>
                    </div>`;

            } else if (isDescription) {
                inputHTML = `<textarea data-field="${key}" class="bg-gray-500/20 border border-transparent focus:border-blue-500/50 rounded px-2 py-1 text-sm text-gray-100 font-bold w-full focus:outline-none transition-colors resize-none h-[60px] uppercase"></textarea>`;

            } else if (isDate) {
                const d = new Date();
                const hoy = `${d.getFullYear()}-${(d.getMonth() + 1).toString().padStart(2, '0')}-${d.getDate().toString().padStart(2, '0')}`;
                inputHTML = `<input type="date" data-field="${key}" value="${hoy}" class="custom-date-input bg-gray-500/20 border border-transparent focus:border-blue-500/50 rounded px-2 py-0 text-sm text-gray-100 font-bold w-full focus:outline-none transition-colors">`;
            
            } else if (isNumeric) {
                inputHTML = `<input type="text" data-field="${key}" data-raw="0" value="0,00" onfocus="this.select()" oninput="applyAccountingMask(this)" class="bg-gray-500/20 border border-transparent focus:border-blue-500/50 rounded px-2 py-0 text-sm text-gray-100 font-bold w-full focus:outline-none text-right transition-colors">`;

            } else {
                // Lógica unificada para campos de texto: NUMERO (máscara) vs OTROS (update alias)
                const isNumeroCard = cleanKey.endsWith('NUMERO');
                const onInputCall = isNumeroCard ? 'applyCardMask(this)' : 'updateTD102Alias()';
                const maxLen = isNumeroCard ? 'maxlength="19"' : '';

                inputHTML = `<input type="text" data-field="${key}" oninput="${onInputCall}" ${maxLen} class="bg-gray-500/20 border border-transparent focus:border-blue-500/50 rounded px-2 py-0 text-sm text-gray-100 font-bold w-full focus:outline-none uppercase transition-colors">`;
            }

            rowItem.innerHTML = `
                <span class="text-gray-200 font-medium uppercase text-[10px] self-start flex items-center">
                    ${cfg.label || key}${asterisco}
                </span>
                ${inputHTML}`;
                
            content.appendChild(rowItem);
        });

        if (window.lucide) lucide.createIcons();
        
        setTimeout(() => {
            const firstInput = content.querySelector('input, textarea, select');
            if (firstInput) firstInput.focus();
        }, 200);
    }

    function TransferAccountRecord() {
        // 1. LIMPIEZA DE DATOS Y PREPARACIÓN DEL DICCIONARIO EXPANDIDO
        const tableData = JSON.parse(localStorage.getItem('TABLE_DATA') || '{}');
        const tableOrigin = "TD101_MAIN";
        //const tableOrigin = tableData.TABLA_ORIGEN || currentTableName;
        const dictionary = JSON.parse(localStorage.getItem('VALUE_DICTIONARY') || '{}');
        
        const tableClean = String(tableOrigin).toUpperCase();
        const prefix = tableClean.split('_')[0]; 
        const dictionaryTR = { ...dictionary };

        const keyEmisora = `${tableClean}|${prefix}ALIASCUENTA`;
        const keyReceptora = `${tableClean}|${prefix}CUENTA2`;
        
        if (dictionary[keyEmisora]) {
            dictionaryTR[keyReceptora] = dictionary[keyEmisora];
        }

        localStorage.setItem('TABLE_DATA', JSON.stringify({ 
            TABLA_ORIGEN: tableOrigin,
            DATOS_REGISTRO: null 
        }));

        ['Duplicar', 'Borrar', 'Nuevo', 'Editar', 'Cancelar'].forEach(disableButton);
